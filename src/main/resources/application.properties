spring.application.name=attachlink-backend

# --- MySQL Connection ---
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/attachlink_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root

# spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep connections alive and validate them before handing them to Hibernate
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
# Max lifetime must be less than MySQL's wait_timeout (default 8 hours/28800s)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# This is a secure 256-bit Base64 encoded secret key.
jwt.secret=3a9d2c3c62bc6aae26d780c784d48519055a94ccb84f78217f39462f34bf70c9

# --- Server ---
server.port=8080

